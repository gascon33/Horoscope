<script>
    const ZODIAC = ['♈ Овен', '♉ Телец', '♊ Близнецы', '♋ Рак', '♌ Лев', '♍ Дева',
                    '♎ Весы', '♏ Скорпион', '♐ Стрелец', '♑ Козерог', '♒ Водолей', '♓ Рыбы'];
    
    const ZODIAC_TYPES = {
        'Овен': 'Огонь', 'Лев': 'Огонь', 'Стрелец': 'Огонь',
        'Телец': 'Земля', 'Дева': 'Земля', 'Козерог': 'Земля',
        'Близнецы': 'Воздух', 'Весы': 'Воздух', 'Водолей': 'Воздух',
        'Рак': 'Вода', 'Скорпион': 'Вода', 'Рыбы': 'Вода'
    };

    function getJulianDay(date) {
        const y = date.getFullYear();
        const m = date.getMonth() + 1;
        const d = date.getDate() + date.getHours() / 24 + date.getMinutes() / 1440;
        
        let a = Math.floor((14 - m) / 12);
        let jy = y + 4800 - a;
        let jm = m + 12 * a - 3;
        
        return d + Math.floor((153 * jm + 2) / 5) + 365 * jy + Math.floor(jy / 4) - Math.floor(jy / 100) + Math.floor(jy / 400) - 32045.5;
    }

    function calcSunLongitude(jd) {
        const T = (jd - 2451545.0) / 36525.0;
        const L0 = 280.46646 + 36000.76983 * T + 0.0003032 * T * T;
        const M = 357.52911 + 35999.05029 * T - 0.0001536 * T * T;
        const M_rad = M * Math.PI / 180;
        const C = (1.914602 - 0.004817 * T - 0.000014 * T * T) * Math.sin(M_rad) +
                  (0.019993 - 0.000101 * T) * Math.sin(2 * M_rad) + 
                  0.000029 * Math.sin(3 * M_rad);
        return ((L0 + C) % 360 + 360) % 360;
    }

    function calcMoonLongitude(jd) {
        const T = (jd - 2451545.0) / 36525.0;
        const Lprime = 218.3164477 + 481267.88123421 * T - 0.0015786 * T * T + T * T * T / 538841 - T * T * T * T / 65194000;
        const D = 297.8501921 + 445267.1114469 * T - 0.0018695 * T * T + T * T * T / 545868 - T * T * T * T / 113065000;
        const M = 357.52910918 + 35999.05029094 * T;
        const Mprime = 134.96298139 + 477198.8675055 * T + 0.0087414 * T * T + T * T * T / 69699 - T * T * T * T / 14712000;
        
        const D_rad = D * Math.PI / 180;
        const M_rad = M * Math.PI / 180;
        const Mprime_rad = Mprime * Math.PI / 180;
        
        const arg1 = 6.28875 * Math.sin(Mprime_rad);
        const arg2 = 1.27402 * Math.sin(2 * D_rad - Mprime_rad);
        const arg3 = 0.66871 * Math.sin(2 * D_rad);
        const arg4 = 0.21490 * Math.sin(2 * Mprime_rad);
        const arg5 = -0.19956 * Math.sin(M_rad);
        
        const lon = Lprime + arg1 + arg2 + arg3 + arg4 + arg5;
        return ((lon % 360) + 360) % 360;
    }

    function getZodiacSign(lon) {
        lon = ((lon % 360) + 360) % 360;
        return ZODIAC[Math.floor(lon / 30)];
    }

    function getZodiacBase(sign) {
        return sign.split(' ')[1];
    }

    function calcPlanets(date) {
        const jd = getJulianDay(date);
        return {
            sun: calcSunLongitude(jd),
            moon: calcMoonLongitude(jd),
            mercury: calcSunLongitude(jd) + 20,
            venus: calcSunLongitude(jd) - 45,
            mars: calcMoonLongitude(jd) + 60
        };
    }

    function generateRecommendations(planets, period) {
        const moonSign = getZodiacSign(planets.moon);
        const moonBase = getZodiacBase(moonSign);
        const moonType = ZODIAC_TYPES[moonBase];
        
        const venusSign = getZodiacSign(planets.venus);
        const venusBase = getZodiacBase(venusSign);
        
        const mercurySign = getZodiacSign(planets.mercury);
        const mercuryBase = getZodiacBase(mercurySign);
        
        const marsSign = getZodiacSign(planets.mars);
        const marsBase = getZodiacBase(marsSign);
        
        if (period === 'today') {
            return [
                {
                    t: '😊 Настроение',
                    txt: `Луна в ${moonSign} (${moonType}). ${moonType === 'Вода' ? 'Доверьте интуиции - она сильна.' : moonType === 'Огонь' ? 'Энергия на максимуме, используйте её.' : moonType === 'Воздух' ? 'Общайтесь и делитесь идеями.' : 'Вам нужна стабильность и комфорт.'} Слушайте себя.`,
                    r: moonType === 'Вода' || moonType === 'Огонь' ? 4 : 3
                },
                {
                    t: '💰 Финансы',
                    txt: `Венера в ${venusSign}. ${venusBase === 'Телец' || venusBase === 'Весы' ? 'Хороший день для покупок, которые приносят радость. Инвестируйте в качество.' : venusBase === 'Козерог' ? 'День экономии. Отложите деньги, не тратьте.' : venusBase === 'Дева' ? 'Анализируйте расходы. День для бюджета.' : 'Среднестабильный день. Ничего экстремального.'}`,
                    r: venusBase === 'Телец' || venusBase === 'Весы' ? 4 : 3
                },
                {
                    t: '📈 Бизнес',
                    txt: `Меркурий в ${mercurySign}. ${mercuryBase === 'Близнецы' || mercuryBase === 'Дева' ? 'Ваши слова убедительны. Переговоры идут хорошо. Завершайте сделки.' : mercuryBase === 'Стрелец' || mercuryBase === 'Стрелец' ? 'Риск неточности. Проверяйте детали дважды.' : 'День для анализа и планирования.'}`,
                    r: mercuryBase === 'Близнецы' || mercuryBase === 'Дева' ? 5 : 3
                },
                {
                    t: '🤝 Переговоры',
                    txt: `Меркурий поддерживает коммуникацию. Проводите встречи с 10:00 до 16:00. Партнёры готовы слушать. Говорите ясно и честно. Это хороший день для контрактов.`,
                    r: 4
                },
                {
                    t: '💑 Отношения',
                    txt: `Венера ведёт ваши чувства. ${venusBase === 'Лев' ? 'Щедрость и величие. Выражайте чувства открыто.' : venusBase === 'Скорпион' ? 'Интенсивность и глубина. Это день для важных разговоров.' : venusBase === 'Рыбы' ? 'Нежность и мечты. Романтика в воздухе.' : 'Слушайте партнёра, будьте внимательны.'}`,
                    r: venusBase === 'Лев' ? 5 : venusBase === 'Рыбы' ? 4 : 3
                },
                {
                    t: '💖 Любовь',
                    txt: `Марс в ${marsSign} разжигает страсть. ${marsBase === 'Овен' || marsBase === 'Лев' ? 'Смелость и решительность. Не стесняйтесь первого шага.' : marsBase === 'Скорпион' ? 'Интенсивность и магнетизм. Вы притягиваете.' : marsBase === 'Дева' ? 'Забота и внимание. Покажите свою любовь делами.' : 'Будьте внимательны к деталям.'}`,
                    r: marsBase === 'Огонь' || marsBase === 'Скорпион' ? 5 : 3
                }
            ];
        } else if (period === 'tomorrow') {
            return [
                {t: '😊 Настроение', txt: 'Завтра Луна сместится. Нужна адаптация. День для внутренней работы, не для внешних подвигов.', r: 2},
                {t: '💰 Финансы', txt: 'День осторожности. Избегайте спонтанных решений. Отложите крупные покупки.', r: 2},
                {t: '📈 Бизнес', txt: 'Меркурий замедляется. Доделывайте старые дела, не начинайте новое.', r: 2},
                {t: '🤝 Переговоры', txt: 'Требует подготовки. Партнёры менее открыты. Лучше перенести важные встречи.', r: 2},
                {t: '💑 Отношения', txt: 'День для поддержки друг друга. Партнёр может быть грустным. Просто будьте рядом.', r: 3},
                {t: '💖 Любовь', txt: 'Романтика отступает. День для нежности, а не страсти. Слушайте, не доминируйте.', r: 3}
            ];
        } else if (period === 'week') {
            return [
                {t: '😊 Настроение', txt: 'Неделя начинается спокойно, к четвергу энергия растёт. Это волна - используйте её. Четверг - пик.', r: 3},
                {t: '💰 Финансы', txt: 'Начало медленно. К середине появляются возможности. Четверг-пятница благоприятны. Конец - подведение итогов.', r: 3},
                {t: '📈 Бизнес', txt: 'Вторник и четверг - ключевые дни. Среда - кризисный, требует аккуратности. Пятница - планирование.', r: 4},
                {t: '🤝 Переговоры', txt: 'Лучшие дни: вт (коммуникация), чт (решительность). Избегайте среды. Проводите встречи на вт/чт.', r: 3},
                {t: '💑 Отношения', txt: 'Волнообразно. Пн - спокойствие, ср - риск недопонимания, чт-пт - сближение. Выходные - уют.', r: 3},
                {t: '💖 Любовь', txt: 'Нарастающая волна к концу недели. Начните важные разговоры в четверг. Выходные - романтика.', r: 4}
            ];
        } else {
            return [
                {t: '😊 Настроение', txt: 'Месяц преобразований. Неделя 1 - подготовка, 2 - действие, 3 - переосмысление, 4 - завершение.', r: 4},
                {t: '💰 Финансы', txt: 'Пики: 12-15 и 24-28 числа. Инвестируйте тогда. Избегайте 8-11 (кризис). Месяц обещает рост.', r: 3},
                {t: '📈 Бизнес', txt: 'План (1-7), реализация (8-15), корректировка (16-22), завершение (23-30). Крупные решения на 12-15.', r: 4},
                {t: '🤝 Переговоры', txt: 'Сильные периоды: 3-7, 12-15, 24-28. Избегайте 1-2 и 8-11. Контракты и соглашения в пиковые дни.', r: 4},
                {t: '💑 Отношения', txt: 'Развитие и укрепление. Первая половина - активность, вторая - стабилизация. Кризис 16-22 - это переоценка, не конец.', r: 3},
                {t: '💖 Любовь', txt: 'Месяц страсти и новизны. Пики: 12-15 и 24-28. Используйте эти дни для важных шагов и признаний.', r: 5}
            ];

    function startMode(m) {
        document.getElementById('modeSelect').classList.remove('active');
        document.getElementById(m === 'p' ? 'personal' : 'business').classList.add('active');
    }

    function backMode() {
        document.getElementById('personal').classList.remove('active');
        document.getElementById('business').classList.remove('active');
        document.getElementById('modeSelect').classList.add('active');
    }

    function calcPersonal(e) {
        e.preventDefault();
        const dateInput = document.getElementById('pDate');
        if (!dateInput.value) return;
        
        const [y, m, d] = dateInput.value.split('-');
        const [h, min] = document.getElementById('pTime').value.split(':');
        const date = new Date(y, m - 1, d, h, min);
        
        const planets = calcPlanets(date);
        displayChart('p', planets);
        document.getElementById('pRes').classList.add('active');
        renderPHoro(planets);
        document.getElementById('pHoro').style.display = 'block';
    }

    function calcBusiness(e) {
        e.preventDefault();
        const dateInput = document.getElementById('bDate');
        if (!dateInput.value) return;
        
        const [y, m, d] = dateInput.value.split('-');
        const [h, min] = document.getElementById('bTime').value.split(':');
        const date = new Date(y, m - 1, d, h, min);
