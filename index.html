<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTRO</title>

<style>
body{
background:#0a0f23;
color:#fff;
font-family:Arial;
padding:20px;
}
button{padding:10px;margin-top:10px}
input{padding:10px;margin:5px 0;width:100%}
</style>

</head>

<body>

<h2>ASTRO</h2>

<input type="date" id="pDate">
<input type="time" id="pTime" value="12:00">
<input type="text" id="pPlace" placeholder="Город">

<button onclick="calcPersonal()">Рассчитать</button>

<div id="pChart" style="margin-top:20px;"></div>

<script>

// ---------- БАЗА ----------

const ZODIAC = ['Овен','Телец','Близнецы','Рак','Лев','Дева','Весы','Скорпион','Стрелец','Козерог','Водолей','Рыбы'];

function norm360(x){
return ((x % 360) + 360) % 360;
}

function getZodiac(lon){
return ZODIAC[Math.floor(norm360(lon)/30)];
}

// ---------- ЮЛИАНСКИЙ ДЕНЬ ----------

function getJulianDay(date){
const y = date.getFullYear();
const m = date.getMonth()+1;
const d = date.getDate() + date.getHours()/24;

let a = Math.floor((14-m)/12);
let y2 = y+4800-a;
let m2 = m+12*a-3;

return d + Math.floor((153*m2+2)/5)+365*y2+Math.floor(y2/4)-Math.floor(y2/100)+Math.floor(y2/400)-32045;
}

// ---------- ПЛАНЕТЫ (упрощённо) ----------

function calcPlanets(date){

const jd = getJulianDay(date);

const sun = norm360(280 + 0.985647 * (jd-2451545));
const moon = norm360(218 + 13.176 * (jd-2451545));

return {sun,moon};
}

// ---------- ГОРОД → КООРДИНАТЫ ----------

async function getCoords(city){

const url = "https://nominatim.openstreetmap.org/search?format=json&q=" + encodeURIComponent(city);

const res = await fetch(url);
const data = await res.json();

if(!data.length) return null;

return {
lat: parseFloat(data[0].lat),
lon: parseFloat(data[0].lon)
};
}

// ---------- ASC ----------

function calcASC(date, lat, lon){

const jd = getJulianDay(date);

let GMST = 280.46061837 + 360.98564736629 * (jd-2451545);
GMST = norm360(GMST);

const LST = norm360(GMST + lon);

const e = 23.4393 * Math.PI/180;

const latRad = lat * Math.PI/180;
const lstRad = LST * Math.PI/180;

const asc = Math.atan2(
Math.cos(lstRad),
-Math.sin(lstRad)*Math.cos(e) - Math.tan(latRad)*Math.sin(e)
);

return norm360(asc * 180/Math.PI);
}

// ---------- ДОМА ----------

function calcHouses(asc){

let houses = [];

for(let i=0;i<12;i++){
houses.push(norm360(asc + i*30));
}

return houses;
}

// ---------- ОСНОВНОЙ РАСЧЁТ ----------

async function calcPersonal(){

const city = document.getElementById('pPlace').value;

if(!city){
alert("Введите город");
return;
}

const coords = await getCoords(city);

if(!coords){
alert("Город не найден");
return;
}

const dateInput = document.getElementById('pDate').value;
const timeInput = document.getElementById('pTime').value;

const [y,m,d] = dateInput.split('-');
const [h,min] = timeInput.split(':');

const date = new Date(y, m-1, d, h, min);

const planets = calcPlanets(date);

const asc = calcASC(date, coords.lat, coords.lon);

const houses = calcHouses(asc);

// ---------- ВЫВОД ----------

let html = "";

html += "<b>Солнце:</b> " + getZodiac(planets.sun) + "<br>";
html += "<b>Луна:</b> " + getZodiac(planets.moon) + "<br>";
html += "<b>ASC:</b> " + getZodiac(asc) + "<br><br>";

html += "<b>Дома:</b><br>";

houses.forEach((h,i)=>{
html += (i+1) + " дом: " + getZodiac(h) + "<br>";
});

document.getElementById('pChart').innerHTML = html;

}

</script>

</body>
</html>
