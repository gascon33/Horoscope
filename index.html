<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTRO | Персональный прогноз</title>

<style>
body {
    background: #0a0f23;
    color: #fff;
    font-family: Arial;
    padding: 20px;
}

input, button {
    padding: 10px;
    margin: 5px 0;
    width: 100%;
}

.card {
    border: 1px solid #555;
    padding: 15px;
    margin-top: 10px;
}
</style>
</head>

<body>

<h2>ASTRO</h2>
<p>Персональный астрологический прогноз</p>

<input type="date" id="date">
<input type="time" id="time" value="12:00">

<button onclick="run()">Рассчитать</button>

<div id="result"></div>

<script>

const ZODIAC = ["Овен","Телец","Близнецы","Рак","Лев","Дева","Весы","Скорпион","Стрелец","Козерог","Водолей","Рыбы"];

function jd(date){
    return date/86400000 + 2440587.5;
}

function sun(j){
    let T = (j-2451545)/36525;
    let L = 280.46 + 36000.77*T;
    let M = 357.529 + 35999.05*T;
    let C = 1.914*Math.sin(M*Math.PI/180);
    return (L+C)%360;
}

function moon(j){
    return (218.3 + 13.176*(j-2451545))%360;
}

function sign(lon){
    return ZODIAC[Math.floor((lon%360)/30)];
}

function run(){

    let d = document.getElementById("date").value;
    let t = document.getElementById("time").value;

    if(!d) return;

    let dt = new Date(d+"T"+t);
    let j = jd(dt);

    let natalSun = sun(j);
    let natalMoon = moon(j);

    let now = new Date();
    let jNow = jd(now);

    let transitSun = sun(jNow);
    let transitMoon = moon(jNow);

    let text = `
    <div class="card">
    <b>Ваш профиль</b><br>
    Солнце: ${sign(natalSun)}<br>
    Луна: ${sign(natalMoon)}
    </div>

    <div class="card">
    <b>Сегодня</b><br>
    Солнце сейчас в ${sign(transitSun)}<br>
    Луна сейчас в ${sign(transitMoon)}
    </div>

    <div class="card">
    <b>Интерпретация</b><br>
    ${
        sign(transitMoon) === sign(natalMoon)
        ? "Эмоциональный день. Вы в своей стихии."
        : "День требует адаптации."
    }
    </div>
    `;

    document.getElementById("result").innerHTML = text;
}

</script>

</body>
</html>
