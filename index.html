    function getJulianDay(date) {
        const y = date.getFullYear();
        const m = date.getMonth() + 1;
        const d = date.getDate() + date.getHours() / 24 + date.getMinutes() / 1440;
        
        let a = Math.floor((14 - m) / 12);
        let jy = y + 4800 - a;
        let jm = m + 12 * a - 3;
        
        return d + Math.floor((153 * jm + 2) / 5) + 365 * jy + Math.floor(jy / 4) - Math.floor(jy / 100) + Math.floor(jy / 400) - 32045.5;

    function calcSunLongitude(jd) {
        const T = (jd - 2451545.0) / 36525.0;
        const L0 = 280.46646 + 36000.76983 * T + 0.0003032 * T * T;
        const M = 357.52911 + 35999.05029 * T - 0.0001536 * T * T;
        const M_rad = M * Math.PI / 180;
        const C = (1.914602 - 0.004817 * T - 0.000014 * T * T) * Math.sin(M_rad) +
                  (0.019993 - 0.000101 * T) * Math.sin(2 * M_rad) + 
                  0.000029 * Math.sin(3 * M_rad);
        return ((L0 + C) % 360 + 360) % 360;
    }

    function calcMoonLongitude(jd) {
        const T = (jd - 2451545.0) / 36525.0;
        const Lprime = 218.3164477 + 481267.88123421 * T - 0.0015786 * T * T + T * T * T / 538841 - T * T * T * T / 65194000;
        const D = 297.8501921 + 445267.1114469 * T - 0.0018695 * T * T + T * T * T / 545868 - T * T * T * T / 113065000;
        const M = 357.52910918 + 35999.05029094 * T;
        const Mprime = 134.96298139 + 477198.8675055 * T + 0.0087414 * T * T + T * T * T / 69699 - T * T * T * T / 14712000;
        
        const D_rad = D * Math.PI / 180;
        const M_rad = M * Math.PI / 180;
        const Mprime_rad = Mprime * Math.PI / 180;
        
        const arg1 = 6.28875 * Math.sin(Mprime_rad);
        const arg2 = 1.27402 * Math.sin(2 * D_rad - Mprime_rad);
        const arg3 = 0.66871 * Math.sin(2 * D_rad);

        const arg6 = -0.11864 * Math.sin(2 * D_rad - 2 * Mprime_rad);

        const e = 0.20563593 + 0.000020 * T;
        const E = M_rad + e * Math.sin(M_rad) * (1 + e * Math.cos(M_rad)) / (1 - e * e);
        const nu = 2 * Math.atan2(Math.sqrt(1 + e) * Math.sin(E / 2), Math.sqrt(1 - e) * Math.cos(E / 2));
        return ((100.46457 + (nu * 180 / Math.PI)) % 360 + 360) % 360;
    }

    function calcVenusLongitude(jd) {
        const T = (jd - 2451545.0) / 36525.0;
        const L = 181.97973 + 58517.80666 * T + 0.00005 * T * T;
        const M = (L - 131.56237) % 360;
        const M_rad = M * Math.PI / 180;
        const e = 0.00677323;
        const E = M_rad + e * Math.sin(M_rad) * (1 + e * Math.cos(M_rad)) / (1 - e * e);
        const nu = 2 * Math.atan2(Math.sqrt(1 + e) * Math.sin(E / 2), Math.sqrt(1 - e) * Math.cos(E / 2));
        return ((131.56237 + (nu * 180 / Math.PI)) % 360 + 360) % 360;
    }

    function calcMarsLongitude(jd) {
        const T = (jd - 2451545.0) / 36525.0;
        const L = 355.43333 + 19140.29970 * T + 0.00005 * T * T;
        const M = (L - 49.55424) % 360;
        const M_rad = M * Math.PI / 180;
        const e = 0.09341233 + 0.000093 * T;
        const E = M_rad + e * Math.sin(M_rad) * (1 + e * Math.cos(M_rad)) / (1 - e * e);
        const nu = 2 * Math.atan2(Math.sqrt(1 + e) * Math.sin(E / 2), Math.sqrt(1 - e) * Math.cos(E / 2));
        return ((49.55424 + (nu * 180 / Math.PI)) % 360 + 360) % 360;
    }

function norm360(x){
    return ((x % 360) + 360) % 360;
}

calcPlanets = function(date){

    const jd = getJulianDay(date);

    function sun(j){
        const T = (j - 2451545.0) / 36525.0;
        const L0 = 280.46646 + 36000.76983 * T;
        const M = 357.52911 + 35999.05029 * T;
        const C = 1.914 * Math.sin(M * Math.PI / 180);
        return norm360(L0 + C);
    }

    function moon(j){
        return norm360(218.3 + 13.176 * (j - 2451545));
    }

    function mercury(j){
        return norm360(sun(j) + 20);
    }

    function venus(j){
        return norm360(sun(j) - 45);
    }

    function mars(j){
        return norm360(moon(j) + 60);
    }

    return {
        sun: sun(jd),
        moon: moon(jd),
        mercury: mercury(jd),
        venus: venus(jd),
        mars: mars(jd)
    };
}
